<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./static/icon/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="./static/layui/v2.7.6/css/layui.css">
    <link rel="stylesheet" href="./static/bootstrap/v3.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="./static/index.css">
    <title>WT-IMGS</title>
</head>

<body>
    <canvas id="canvas"></canvas>
    <div class="site-demo-flow" id="imgs"
        style="width: max-content; height: max-content; display: grid; grid-template-columns: repeat(6, 1fr);">
        <img lay-src="./imgs/main_page.png" alt="main_page">
        <img lay-src="./imgs/tmbk.jpg" alt="tmbk">
    </div>
    <div class="modal fade" tabindex="-1" role="dialog" id="loginF" aria-hidden="true" data-backdrop="static" data-keyboard="false">
        <div class="modal-dialog modal-sm" role="document">
          <div class="modal-content">
            <div class="modal-header">
              <h3 class="modal-title" style="text-align: center;">登录后才能访问 !!!</h3>
            </div>
            <div class="modal-body">
                <input type="text" class="form-control" id="user" placeholder="用户名">
                <input type="password" class="form-control" id="pwd" placeholder="密码" style="margin-top: 10px;">
                <button type="button" class="btn btn-primary" style="margin-top: 10px; width: 100%;" onclick="login()">登录</button>
            </div>
            <div class="modal-footer">
                <label id="errmes" style="display: none; color: red; text-align: center;">账号或密码错误!</label>
            </div>
          </div>
        </div>
    </div>

</body>
<script src="./static/jquery.min.js"></script>
<script src="./static/bootstrap/v3.4.1/js/bootstrap.min.js"></script>
<script src="./static/layui/v2.7.6/layui.js"></script>
<script src="./static/xing.js"></script>
<script>
    $("#loginF").modal("show")
    function login() {
        const user = $("#user").val();
        const pwd = $("#pwd").val();
        $.ajax(
            "https://guoweitao.pythonanywhere.com/login",
            {
                method: "POST",
                contentType: "application/json; charset=utf-8",
                dataType: "json",
                data: JSON.stringify({user:user, pwd:pwd})
            }
        ).done((res)=>{
            if (res["data"] == "successful") {
            $("#errmes").css("display", "none");
            $("#loginF").modal("hide");
        }
        else {
            $("#errmes").css("display", "block");
        }
        })
    }
    const flow = layui.flow;
    flow.lazyimg({elem: '#imgs img'});
</script>

</html>
